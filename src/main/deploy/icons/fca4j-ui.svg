<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Gradient radial pour l'effet 3D des pastilles -->
    <radialGradient id="gPink" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#ffb0c8"/>
      <stop offset="50%" stop-color="#f472a0"/>
      <stop offset="100%" stop-color="#d44a7a"/>
    </radialGradient>
    <radialGradient id="gGreen" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#c8ff60"/>
      <stop offset="50%" stop-color="#82d832"/>
      <stop offset="100%" stop-color="#4aaa10"/>
    </radialGradient>
    <radialGradient id="gYellow" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#fff176"/>
      <stop offset="50%" stop-color="#fdd835"/>
      <stop offset="100%" stop-color="#d4a800"/>
    </radialGradient>
    <radialGradient id="gRed" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#ff8a80"/>
      <stop offset="50%" stop-color="#ef5350"/>
      <stop offset="100%" stop-color="#c42a28"/>
    </radialGradient>
    <!-- Reflet blanc sur les pastilles -->
    <radialGradient id="shine" cx="38%" cy="30%" r="30%">
      <stop offset="0%" stop-color="white" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fond noir arrondi -->
  <rect x="30" y="30" width="452" height="452" rx="100" fill="#2a2a2a"/>

  <!-- Pastilles avec dégradé 3D (plus grandes, plus écartées) -->
  <circle cx="130" cy="130" r="65" fill="url(#gPink)"/>
  <circle cx="130" cy="130" r="65" fill="url(#shine)"/>

  <circle cx="382" cy="130" r="65" fill="url(#gGreen)"/>
  <circle cx="382" cy="130" r="65" fill="url(#shine)"/>

  <circle cx="130" cy="382" r="65" fill="url(#gYellow)"/>
  <circle cx="130" cy="382" r="65" fill="url(#shine)"/>

  <circle cx="382" cy="382" r="65" fill="url(#gRed)"/>
  <circle cx="382" cy="382" r="65" fill="url(#shine)"/>

  <!-- Œil - forme en amande (plus grand) -->
  <path d="M80,256 Q256,110 432,256 Q256,402 80,256 Z" fill="white"/>

  <!-- Pupille (plus grande) -->
  <circle cx="256" cy="256" r="62" fill="#1a1a1a"/>

  <!-- Reflet de la pupille -->
  <circle cx="237" cy="237" r="16" fill="white" opacity="0.9"/>
</svg>
