<svg width="128" height="128" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0052D4"></stop>
      <stop offset="100%" stop-color="#001F54"></stop>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="4" y="4" width="92" height="92" rx="20" fill="#FFD166"></rect>

  <!-- Edges (slightly thicker for visibility) -->
  <g stroke="url(#gradDark)" stroke-width="2.8" stroke-linecap="round">
    <line x1="50" y1="18" x2="28" y2="40"></line>
    <line x1="50" y1="18" x2="72" y2="40"></line>
    <line x1="28" y1="40" x2="18" y2="68"></line>
    <line x1="28" y1="40" x2="50" y2="68"></line>
    <line x1="72" y1="40" x2="50" y2="68"></line>
    <line x1="72" y1="40" x2="82" y2="68"></line>
    <line x1="18" y1="68" x2="50" y2="88"></line>
    <line x1="50" y1="68" x2="50" y2="88"></line>
    <line x1="82" y1="68" x2="50" y2="88"></line>
  </g>

  <!-- Nodes -->
  <g fill="url(#gradDark)">
    <circle cx="50" cy="18" r="5"></circle>
    <circle cx="28" cy="40" r="5"></circle>
    <circle cx="72" cy="40" r="5"></circle>
    <circle cx="18" cy="68" r="5"></circle>
    <circle cx="82" cy="68" r="5"></circle>
    <circle cx="50" cy="88" r="5"></circle>
    
    <!-- Central node emphasized -->
    <circle cx="50" cy="68" r="6.5"></circle>
  </g>
</svg>