name: Build macOS Installer

on:
  push:
    tags:
      - 'v*'          # déclenché sur v0.1.0, v0.2.0, etc.
  workflow_dispatch:  # déclenchement manuel depuis l'interface GitHub
    inputs:
      version:
        description: 'Version à builder (ex: 0.1.0)'
        required: false
        default: '0.1.0'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      # ── 1. Checkout du code ─────────────────────────────────────────────────
      - name: Checkout fca4j-ui
        uses: actions/checkout@v4.2.2

      # ── 2. JDK 21 ───────────────────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # ── 3. Installer les JARs FCA4J depuis lib/ ────────────────────────────
      # Les JARs sont stockés dans lib/ dans le dépôt (non publiés sur Maven Central)
      - name: Install FCA4J JARs and POMs
        run: |
          # POM parent requis par Maven
          mvn install:install-file -Dfile=lib/fca4j-parent-0.4.6.pom \
            -DgroupId=fr.lirmm.fca4j -DartifactId=fca4j-parent \
            -Dversion=0.4.6 -Dpackaging=pom -q
          # fca4j-iset
          mvn install:install-file -Dfile=lib/fca4j-iset-0.4.6.jar \
            -DgroupId=fr.lirmm.fca4j -DartifactId=fca4j-iset \
            -Dversion=0.4.6 -Dpackaging=jar \
            -DpomFile=lib/fca4j-iset-0.4.6.pom -q
          # fca4j-core
          mvn install:install-file -Dfile=lib/fca4j-core-0.4.6.jar \
            -DgroupId=fr.lirmm.fca4j -DartifactId=fca4j-core \
            -Dversion=0.4.6 -Dpackaging=jar \
            -DpomFile=lib/fca4j-core-0.4.6.pom -q
          # fca4j-io
          mvn install:install-file -Dfile=lib/fca4j-io-0.4.6.jar \
            -DgroupId=fr.lirmm.fca4j -DartifactId=fca4j-io \
            -Dversion=0.4.6 -Dpackaging=jar \
            -DpomFile=lib/fca4j-io-0.4.6.pom -q

      # ── 4. Build JAR + dépendances ──────────────────────────────────────────
      - name: Build with Maven
        run: mvn package -DskipTests -q

      # ── 5. Créer l'installeur DMG ────────────────────────────────────────────
      - name: Create macOS DMG
        run: mvn jpackage:jpackage
        env:
          # Assure que jpackage trouve le bon JDK
          JAVA_HOME: ${{ env.JAVA_HOME }}

      # ── 6. Vérifier que le DMG a été créé ───────────────────────────────────
      - name: List installer output
        run: ls -la target/installer/

      # ── 7. Upload du DMG comme artefact GitHub ───────────────────────────────
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: FCA4J-UI-macOS-${{ github.ref_name }}
          path: target/installer/*.dmg
          retention-days: 30

      # ── 8. Optionnel : attacher le DMG à une GitHub Release ─────────────────
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2.2.1
        with:
          files: target/installer/*.dmg
          fail_on_unmatched_files: false
