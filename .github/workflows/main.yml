name: Build macOS Installer

on:
  push:
    tags:
      - 'v*'          # déclenché sur v0.1.0, v0.2.0, etc.
  workflow_dispatch:  # déclenchement manuel depuis l'interface GitHub
    inputs:
      version:
        description: 'Version à builder (ex: 0.1.0)'
        required: false
        default: '0.1.0'

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      # ── 1. Checkout du code ─────────────────────────────────────────────────
      - name: Checkout fca4j-ui
        uses: actions/checkout@v4

      # ── 2. JDK 21 ───────────────────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # ── 3. Installer les JARs FCA4J localement ──────────────────────────────
      # Option A : si fca4j-project est un sous-module Git
      # - name: Init submodules
      #   run: git submodule update --init --recursive
      # - name: Install fca4j-project
      #   run: cd fca4j-project && mvn install -DskipTests -q

      # Option B : télécharger les JARs depuis une release GitLab LIRMM
      - name: Install FCA4J JARs from GitLab
        run: |
          FCA4J_VERSION="0.4.6"
          BASE_URL="https://gite.lirmm.fr/gutierre/fca4j-project/-/raw/main"
          M2_REPO="$HOME/.m2/repository/fr/lirmm/fca4j"

          install_jar() {
            ARTIFACT=$1
            DIR="$M2_REPO/$ARTIFACT/$FCA4J_VERSION"
            mkdir -p "$DIR"
            JAR_FILE="$DIR/$ARTIFACT-$FCA4J_VERSION.jar"

            # Chercher le JAR dans les artefacts de build du dépôt
            curl -L --fail \
              "https://gite.lirmm.fr/gutierre/fca4j-project/-/jobs/artifacts/main/raw/$ARTIFACT/target/$ARTIFACT-$FCA4J_VERSION.jar?job=build" \
              -o "$JAR_FILE" 2>/dev/null || \
            # Fallback : construire depuis les sources si disponibles
            echo "WARN: $ARTIFACT JAR not found on GitLab artifacts"

            # Créer un POM minimal pour Maven
            cat > "$DIR/$ARTIFACT-$FCA4J_VERSION.pom" << EOF
          <project>
            <modelVersion>4.0.0</modelVersion>
            <groupId>fr.lirmm.fca4j</groupId>
            <artifactId>$ARTIFACT</artifactId>
            <version>$FCA4J_VERSION</version>
          </project>
          EOF
          }

          install_jar "fca4j-iset"
          install_jar "fca4j-core"
          install_jar "fca4j-io"

      # ── Alternative recommandée : stocker les JARs dans le dépôt fca4j-ui ──
      # Si tu places les JARs dans lib/ dans le repo, décommente ceci :
      # - name: Install FCA4J JARs from repo
      #   run: |
      #     mvn install:install-file -Dfile=lib/fca4j-iset-0.4.6.jar \
      #       -DgroupId=fr.lirmm.fca4j -DartifactId=fca4j-iset \
      #       -Dversion=0.4.6 -Dpackaging=jar -q
      #     mvn install:install-file -Dfile=lib/fca4j-core-0.4.6.jar \
      #       -DgroupId=fr.lirmm.fca4j -DartifactId=fca4j-core \
      #       -Dversion=0.4.6 -Dpackaging=jar -q
      #     mvn install:install-file -Dfile=lib/fca4j-io-0.4.6.jar \
      #       -DgroupId=fr.lirmm.fca4j -DartifactId=fca4j-io \
      #       -Dversion=0.4.6 -Dpackaging=jar -q

      # ── 4. Build JAR + dépendances ──────────────────────────────────────────
      - name: Build with Maven
        run: mvn package -DskipTests -q

      # ── 5. Créer l'installeur DMG ────────────────────────────────────────────
      - name: Create macOS DMG
        run: mvn jpackage:jpackage
        env:
          # Assure que jpackage trouve le bon JDK
          JAVA_HOME: ${{ env.JAVA_HOME }}

      # ── 6. Vérifier que le DMG a été créé ───────────────────────────────────
      - name: List installer output
        run: ls -la target/installer/

      # ── 7. Upload du DMG comme artefact GitHub ───────────────────────────────
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: FCA4J-UI-macOS-${{ github.ref_name }}
          path: target/installer/*.dmg
          retention-days: 30

      # ── 8. Optionnel : attacher le DMG à une GitHub Release ─────────────────
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: target/installer/*.dmg
          fail_on_unmatched_files: false
